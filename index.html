<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AquaSense - Smart Irrigation Control</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0b1120; color: #e2e8f0; padding: 20px; }
   .container { max-width: 1450px; margin: 0 auto; }
    h1 { text-align: center; color: #38bdf8; margin-bottom: 8px; font-size: 28px; }
   .subtitle { text-align: center; color: #64748b; margin-bottom: 20px; font-size: 14px; }
   .header-bar { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 10px 15px; border-radius: 8px; margin-bottom: 20px; flex-wrap: wrap; gap:10px; }
   .status { text-align: center; padding: 8px 12px; border-radius: 8px; background: #0f172a; font-weight: 700; font-size: 12px; }
   .status.connected { border: 2px solid #22c55e; color: #22c55e; }
   .status.disconnected { border: 2px solid #ef4444; color: #ef4444; }
   .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }
   .card { background: #1e293b; border-radius: 16px; padding: 20px; border: 3px solid #334155; transition: all 0.3s; animation: pop 0.3s ease; }
    @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
   .card.valve-open { border-color: #22c55e; box-shadow: 0 0 25px rgba(34, 197, 94, 0.25); }
   .card.valve-closed { border-color: #334155; }
   .card h2 { margin-bottom: 15px; color: #7dd3fc; display: flex; justify-content: space-between; align-items: center; font-size: 20px; }
   .badge { padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; }
   .badge.online { background: #166534; color: #bbf7d0; }
   .badge.offline { background: #7f1d1d; color: #fecaca; }
   .valve-status { padding: 14px; border-radius: 10px; font-weight: 800; text-align: center; margin: 10px 0; font-size: 20px; letter-spacing: 1px; }
   .valve-status.open { background: #166534; color: #bbf7d0; }
   .valve-status.closed { background: #7f1d1d; color: #fecaca; }
   .sensor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
   .sensor { background: #0f172a; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #1e293b; }
   .sensor.label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
   .sensor.value { font-size: 26px; font-weight: 800; color: #e2e8f0; margin: 4px 0; }
   .sensor.unit { font-size: 11px; color: #64748b; }
   .controls { background: #0f172a; border-radius: 12px; padding: 15px; margin-top: 15px; }
   .controls h3 { font-size: 13px; color: #38bdf8; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
   .control-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
   .control-item { display: flex; flex-direction: column; gap: 5px; }
   .control-item label { font-size: 11px; color: #94a3b8; }
   .control-item input { background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 8px; color: white; outline: none; }
   .control-item input:focus { border-color: #38bdf8; }
   .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
    button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px; transition: all 0.2s; }
    button:active { transform: scale(0.97); }
    button.btn-open { background: #22c55e; color: white; }
    button.btn-close { background: #ef4444; color: white; }
    button.btn-reset { background: #f59e0b; color: white; }
    button.btn-save { background: #38bdf8; color: #0b1120; }
    button.btn-auto { background: #334155; color: white; }
    button.btn-auto.active { background: #38bdf8; color: #0b1120; box-shadow: 0 0 10px rgba(56,189,248,0.4); }
   .meta { font-size: 11px; color: #64748b; display: flex; justify-content: space-between; margin-top: 12px; }

    /* Login - UPDATED */
    #loginOverlay { position: fixed; inset: 0; background: #0b1120; z-index: 9999; display: flex; align-items: center; justify-content: center; }
   .login-box { background: #1e293b; padding: 35px; border-radius: 16px; width: 100%; max-width: 400px; border: 1px solid #334155; text-align: center; }
   .login-box h2 { color: #38bdf8; margin-bottom: 5px; }
   .login-box p { color: #64748b; font-size: 13px; margin-bottom: 20px; }
   .login-box input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; }
   .login-box input:focus { border-color: #38bdf8; }
   .input-group { margin-bottom: 15px; text-align: left; }
   .password-wrap { position: relative; display: flex; align-items: center; }
   .password-wrap input { padding-right: 42px; margin-bottom: 0; }
   .toggle-eye { position: absolute; right: 10px; background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 18px; padding: 4px; line-height: 1; }
   .toggle-eye:hover { color: #38bdf8; }
    #loginError { color: #ef4444; font-size: 13px; margin-top: 12px; display: none; background: #7f1d1d33; padding: 8px; border-radius: 6px; }
    #emptyMsg { text-align: center; color: #94a3b8; margin-top: 60px; grid-column: 1 / -1; background: #1e293b; padding: 30px; border-radius: 12px; border: 2px dashed #334155; font-size: 18px; }
   .user-info { font-size: 13px; color: #94a3b8; }
   .user-info strong { color: #38bdf8; }
  </style>
</head>
<body>
  <div id="loginOverlay">
    <div class="login-box">
      <h2 style="letter-spacing:1px;">AQUASENSE</h2>
      <p>Smart Irrigation Dashboard Login</p>

      <div class="input-group">
        <input type="text" id="usernameInput" placeholder="Username" autocomplete="username" />
      </div>

      <div class="input-group">
        <div class="password-wrap">
          <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password" />
          <button type="button" class="toggle-eye" id="toggleEye" onclick="togglePassword()">👁️</button>
        </div>
      </div>

      <button style="width:100%; background:#38bdf8; color:#0b1120; margin-top:10px;" onclick="checkLogin()">Enter Dashboard</button>
      <div id="loginError"></div>
      <div style="margin-top:15px; font-size:11px; color:#475569;">Username: aquasense<br>Password: irrigation2026</div>
    </div>
  </div>

  <div class="container" id="mainContainer" style="display:none;">
    <h1>AquaSense</h1>
    <div class="subtitle">Smart Irrigation System | LoRa Master → Auto Nodes</div>
    <div class="header-bar">
      <div class="user-info">Dashboard: <strong id="displayUser">aquasense</strong></div>
      <div style="display:flex; gap:10px; align-items:center;">
        <div id="connStatus" class="status disconnected">Connecting...</div>
        <button style="background:#334155; color:white; padding:6px 12px; font-size:12px;" onclick="logout()">Logout</button>
      </div>
    </div>
    <div class="grid" id="customers">
      <div id="emptyMsg">⏳ Waiting for node to come online...<br><span style="font-size:13px; color:#64748b;">Publishing to irrigation/data/[id]</span></div>
    </div>
  </div>

<script>
  const BROKER = 'wss://broker.hivemq.com:8884/mqtt';
  const TOPIC_CMD = 'irrigation/cmd';
  const TOPIC_DATA = 'irrigation/data/+';

  const DASHBOARD_NAME = "aquasense";
  const DASHBOARD_PASSWORD = "irrigation2026";

  // NEW: Toggle password visibility
  function togglePassword(){
    const input = document.getElementById('passwordInput');
    const eye = document.getElementById('toggleEye');
    if(input.type === 'password'){
      input.type = 'text';
      eye.textContent = '🙈';
    } else {
      input.type = 'password';
      eye.textContent = '👁️';
    }
  }

  function checkLogin(){
    const u = document.getElementById('usernameInput').value.trim().toLowerCase();
    const p = document.getElementById('passwordInput').value.trim();
    const err = document.getElementById('loginError');
    if(!u ||!p){
      err.textContent="Enter dashboard name and password";
      err.style.display='block';
      return;
    }
    if(u === DASHBOARD_NAME && p === DASHBOARD_PASSWORD){
      localStorage.setItem('irrigation_auth','true');
      localStorage.setItem('irrigation_user', DASHBOARD_NAME);
      showDashboard(DASHBOARD_NAME);
    } else {
      err.textContent="Invalid dashboard name or password.";
      err.style.display='block';
    }
  }

  function showDashboard(username){
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('mainContainer').style.display='block';
    document.getElementById('displayUser').textContent = username;
    initMQTT();
  }

  function logout(){ localStorage.clear(); location.reload(); }

  const savedAuth = localStorage.getItem('irrigation_auth');
  const savedUser = localStorage.getItem('irrigation_user');
  if(savedAuth==='true' && savedUser){
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('mainContainer').style.display='block';
    document.getElementById('displayUser').textContent=savedUser;
  }

  document.getElementById('passwordInput')?.addEventListener('keypress', e=>{ if(e.key==='Enter') checkLogin(); });
  document.getElementById('usernameInput')?.addEventListener('keypress', e=>{ if(e.key==='Enter') checkLogin(); });

  const state = {};
  const customersDiv = document.getElementById('customers');
  const connStatus = document.getElementById('connStatus');
  let client;

  function isAnyNodeOnline(){
    return Object.values(state).some(s => (Date.now() - (s.lastSeen || 0)) < 20000);
  }

  function updateEmptyState(){
    const emptyEl = document.getElementById('emptyMsg');
    if(!emptyEl) return;
    const hasNodes = Object.keys(state).length > 0;
    const hasOnline = isAnyNodeOnline();
    if(!hasNodes ||!hasOnline){
      emptyEl.style.display = 'block';
      if(hasNodes &&!hasOnline){
        emptyEl.innerHTML = `⏳ Waiting for node to come online...<br><span style="font-size:13px; color:#ef4444;">All ${Object.keys(state).length} node(s) offline</span>`;
      } else {
        emptyEl.innerHTML = `⏳ Waiting for node to come online...<br><span style="font-size:13px; color:#64748b;">Publishing to irrigation/data/[id]</span>`;
      }
    } else {
      emptyEl.style.display = 'none';
    }
  }

  function initMQTT(){
    if(client) return;
    client = mqtt.connect(BROKER, { clientId: 'dashboard_'+Math.random().toString(16).substr(2,8), clean:true, reconnectPeriod:5000 });
    client.on('connect', ()=>{ connStatus.textContent='MQTT: Connected'; connStatus.className='status connected'; client.subscribe(TOPIC_DATA); });
    client.on('reconnect', ()=>{ connStatus.textContent='Reconnecting...'; connStatus.className='status disconnected'; });
    client.on('error', ()=>{ connStatus.textContent='Error'; connStatus.className='status disconnected'; });
    client.on('message', (topic, payload)=>{
      try{
        const data = JSON.parse(payload.toString());
        const id = data.id; if(!id) return;
        if(!state[id]){ state[id]={}; createCustomerCard(id); }
        state[id]={...state[id],...data, lastSeen: Date.now()};
        updateUI(id);
      }catch(e){ console.error(e); }
    });
  }
  if(savedAuth==='true') initMQTT();

  function createCustomerCard(id){
    if(document.getElementById(`customer-${id}`)) return;
    customersDiv.insertAdjacentHTML('beforeend', `
      <div class="card valve-closed" id="customer-${id}">
        <h2>Node ${id} <span class="badge offline" id="status-${id}">OFFLINE</span></h2>
        <div class="valve-status closed" id="valve-${id}">CLOSED</div>
        <div class="sensor-grid">
          <div class="sensor"><div class="label">DHT22 Temp</div><div class="value" id="temp-${id}">--</div><div class="unit">°C</div></div>
          <div class="sensor"><div class="label">DHT22 Humidity</div><div class="value" id="hum-${id}">--</div><div class="unit">%</div></div>
          <div class="sensor"><div class="label">Moisture 1</div><div class="value" id="moist1-${id}">--</div><div class="unit">%</div></div>
          <div class="sensor"><div class="label">Moisture 2</div><div class="value" id="moist2-${id}">--</div><div class="unit">%</div></div>
          <div class="sensor"><div class="label">Flow Rate</div><div class="value" id="flow-${id}">--</div><div class="unit">L/min</div></div>
          <div class="sensor"><div class="label">Total Water</div><div class="value" id="total-${id}">--</div><div class="unit">Liters</div></div>
        </div>
        <div class="controls">
          <h3>Valve Control</h3>
          <div class="btn-group">
            <button class="btn-open" onclick="sendCmd(${id}, 'open')">Open Valve</button>
            <button class="btn-close" onclick="sendCmd(${id}, 'close')">Close Valve</button>
            <button class="btn-auto" id="auto-${id}" onclick="toggleAuto(${id})">Auto: OFF</button>
          </div>
        </div>
        <div class="controls">
          <h3>Moisture Sensor Control (Auto Threshold)</h3>
          <div class="control-row">
            <div class="control-item"><label>Moist 1 Dry Limit %</label><input type="number" id="thresh1-${id}" value="30" min="0" max="100"></div>
            <div class="control-item"><label>Moist 2 Dry Limit %</label><input type="number" id="thresh2-${id}" value="30" min="0" max="100"></div>
          </div>
          <button class="btn-save" style="width:100%; margin-top:5px;" onclick="saveMoistureConfig(${id})">Save Moisture Settings</button>
        </div>
        <div class="controls">
          <h3>Flow & DHT22 Config</h3>
          <div class="control-row">
            <div class="control-item"><label>Flow Calib Factor (pulses/L)</label><input type="number" id="flowCal-${id}" value="450" step="1"></div>
            <div class="control-item"><label>DHT22 Read Interval (sec)</label><input type="number" id="dhtInt-${id}" value="10" min="2" max="3600"></div>
          </div>
          <div class="btn-group">
            <button class="btn-reset" onclick="sendCmd(${id}, 'reset')">Reset Total</button>
            <button class="btn-reset" style="background:#334155;" onclick="sendCmd(${id}, 'resetFlowCal')">Reset Flow</button>
            <button class="btn-save" onclick="saveFlowDhtConfig(${id})">Save Flow/DHT</button>
          </div>
        </div>
        <div class="meta"><span>RSSI: <span id="rssi-${id}">--</span> dBm</span><span>Updated: <span id="last-${id}">Never</span></span></div>
      </div>
    `);
  }

  function sendCmd(id, action){
    if(!client ||!client.connected){ alert('MQTT not connected'); return; }
    client.publish(TOPIC_CMD, JSON.stringify({ id: id, cmd: action, ts: Date.now() }));
    if(!state[id]) state[id]={};
    if(action==='open') state[id].valve=1;
    if(action==='close') state[id].valve=0;
    if(action==='reset') state[id].total=0;
    updateUI(id);
  }

  function toggleAuto(id){
    if(!state[id]) state[id]={};
    state[id].auto =!state[id].auto;
    const btn = document.getElementById(`auto-${id}`);
    btn.textContent = state[id].auto? 'Auto: ON' : 'Auto: OFF';
    btn.className = state[id].auto? 'btn-auto active' : 'btn-auto';
    client.publish(TOPIC_CMD, JSON.stringify({ id: id, cmd: 'auto', value: state[id].auto?1:0 }));
  }

  function saveMoistureConfig(id){
    const t1 = parseFloat(document.getElementById(`thresh1-${id}`).value);
    const t2 = parseFloat(document.getElementById(`thresh2-${id}`).value);
    client.publish(TOPIC_CMD, JSON.stringify({ id: id, cmd: 'setMoisture', thresh1: t1, thresh2: t2 }));
    alert(`Node ${id}: Moisture thresholds saved -> M1:${t1}% M2:${t2}%`);
  }

  function saveFlowDhtConfig(id){
    const flowCal = parseFloat(document.getElementById(`flowCal-${id}`).value);
    const dhtInt = parseInt(document.getElementById(`dhtInt-${id}`).value);
    client.publish(TOPIC_CMD, JSON.stringify({ id: id, cmd: 'setFlowDht', flowCal: flowCal, dhtInterval: dhtInt }));
    alert(`Node ${id}: FlowCal=${flowCal} | DHT Interval=${dhtInt}s saved`);
  }

  function updateUI(id){
    const s = state[id]; if(!s ||!document.getElementById(`customer-${id}`)) return;
    const online = Date.now() - (s.lastSeen||0) < 20000;
    document.getElementById(`status-${id}`).textContent = online?'ONLINE':'OFFLINE';
    document.getElementById(`status-${id}`).className = online?'badge online':'badge offline';
    const card = document.getElementById(`customer-${id}`);
    const valveEl = document.getElementById(`valve-${id}`);
    if(s.valve===1){ card.className='card valve-open'; valveEl.textContent='OPEN'; valveEl.className='valve-status open'; }
    else { card.className='card valve-closed'; valveEl.textContent='CLOSED'; valveEl.className='valve-status closed'; }
    document.getElementById(`temp-${id}`).textContent = s.temp?.toFixed(1)??'--';
    document.getElementById(`hum-${id}`).textContent = s.hum?.toFixed(0)??'--';
    document.getElementById(`moist1-${id}`).textContent = s.moist1?.toFixed(0)??'--';
    document.getElementById(`moist2-${id}`).textContent = s.moist2?.toFixed(0)??'--';
    document.getElementById(`flow-${id}`).textContent = s.flow?.toFixed(2)??'--';
    document.getElementById(`total-${id}`).textContent = s.total?.toFixed(1)??'--';
    document.getElementById(`rssi-${id}`).textContent = s.rssi??'--';
    if(s.auto!==undefined){
      const btn=document.getElementById(`auto-${id}`);
      if(btn){ btn.textContent=s.auto?'Auto: ON':'Auto: OFF'; btn.className=s.auto?'btn-auto active':'btn-auto'; }
    }
    if(s.lastSeen){
      const sec=Math.floor((Date.now()-s.lastSeen)/1000);
      document.getElementById(`last-${id}`).textContent = sec<60?`${sec}s ago`:`${Math.floor(sec/60)}m ago`;
    }
    updateEmptyState();
  }
  setInterval(()=>{ Object.keys(state).forEach(id=>updateUI(id)); updateEmptyState(); },2000);
</script>
</body>
  </html>
